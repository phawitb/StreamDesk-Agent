<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamDesk Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, sans-serif; }

        /* ── Idle / Standby screen ── */
        #idle-screen {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0a0a1a 100%);
            z-index: 5; transition: opacity 0.6s ease;
        }
        #idle-screen.hidden { opacity: 0; pointer-events: none; }
        .logo { width: 80px; height: 80px; border-radius: 20px; background: rgba(99,102,241,0.15); display: flex; align-items: center; justify-content: center; margin-bottom: 24px; }
        .logo svg { width: 40px; height: 40px; color: #818cf8; }
        #idle-screen h1 { color: #e2e8f0; font-size: 28px; font-weight: 600; margin-bottom: 8px; }
        #idle-screen p { color: #64748b; font-size: 16px; }
        .status-badge { margin-top: 32px; padding: 8px 16px; border-radius: 20px; background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.2); display: flex; align-items: center; gap: 8px; color: #818cf8; font-size: 14px; }
        .status-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: #818cf8; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

        /* ── QR Standby screen ── */
        #standby-screen {
            position: absolute; inset: 0;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0a0a1a 100%);
            z-index: 6;
        }
        #standby-screen.active { display: flex; }
        #standby-screen .standby-logo {
            width: 100px; height: 100px; border-radius: 24px;
            background: rgba(99,102,241,0.15);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 32px;
        }
        #standby-screen .standby-logo svg { width: 52px; height: 52px; color: #818cf8; }
        #standby-screen h1 { color: #e2e8f0; font-size: 36px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
        #standby-screen .subtitle { color: #64748b; font-size: 18px; margin-bottom: 48px; }
        #qr-container {
            background: #fff; border-radius: 20px; padding: 20px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 60px rgba(99,102,241,0.15);
        }
        #qr-container canvas { display: block; }
        #standby-url {
            margin-top: 20px; color: #818cf8; font-size: 16px;
            font-family: monospace; letter-spacing: 0.5px;
        }
        .scan-hint {
            margin-top: 32px; color: #475569; font-size: 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .scan-hint svg { width: 18px; height: 18px; }

        /* ── Media ── */
        #media-container { position: absolute; inset: 0; z-index: 10; }
        #media-container.hidden { display: none; }
        #video-player { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; background: #000; }
        #video-player.hidden { display: none; }
        #embed-player { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
        #embed-player.hidden { display: none; }

        
        /* ── Stream URL bar ── */
        #stream-url-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(10,10,26,0.85); backdrop-filter: blur(10px);
            border-top: 1px solid rgba(99,102,241,0.2);
            padding: 10px 20px; z-index: 50;
            display: none; flex-direction: column; gap: 6px;
            transition: transform 0.3s ease;
        }
        #stream-url-bar.show { display: flex; }
        .url-row { display: flex; align-items: center; gap: 10px; }
        #stream-url-bar .url-label {
            color: #64748b; font-size: 12px; white-space: nowrap;
            text-transform: uppercase; letter-spacing: 0.5px;
            min-width: 55px;
        }
        #stream-url-bar a {
            color: #818cf8; font-size: 13px; text-decoration: none;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            flex: 1; font-family: monospace;
        }
        #stream-url-bar a:hover { color: #a5b4fc; text-decoration: underline; }
        #stream-url-bar .copy-btn {
            background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3);
            color: #818cf8; border-radius: 6px; padding: 4px 12px;
            font-size: 12px; cursor: pointer; white-space: nowrap;
        }
        #stream-url-bar .copy-btn:hover { background: rgba(99,102,241,0.25); }
        #stream-url-bar .close-btn {
            position: absolute; top: 8px; right: 12px;
            background: none; border: none; color: #475569;
            font-size: 18px; cursor: pointer; padding: 0 4px;
        }
        #stream-url-bar .close-btn:hover { color: #94a3b8; }

        /* ── Tap to activate overlay ── */
        #activate-overlay {
            position: fixed; inset: 0; z-index: 200;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.85); cursor: pointer;
        }
        #activate-overlay.hidden { display: none; }
        #activate-overlay .tap-icon {
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(99,102,241,0.2); border: 2px solid rgba(99,102,241,0.4);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; animation: tapPulse 2s infinite;
        }
        #activate-overlay .tap-icon svg { width: 36px; height: 36px; color: #818cf8; }
        #activate-overlay p { color: #e2e8f0; font-size: 18px; font-weight: 500; }
        #activate-overlay .sub { color: #64748b; font-size: 14px; margin-top: 8px; }
        @keyframes tapPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }

        #toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-100px); background: rgba(30,30,50,0.9); backdrop-filter: blur(10px); border: 1px solid rgba(99,102,241,0.3); color: #e2e8f0; padding: 12px 24px; border-radius: 12px; font-size: 16px; z-index: 100; transition: transform 0.4s ease; max-width: 80%; }
        #toast.show { transform: translateX(-50%) translateY(0); }

        #volume-overlay { position: fixed; right: 40px; top: 50%; transform: translateY(-50%); width: 6px; height: 200px; background: rgba(255,255,255,0.15); border-radius: 3px; z-index: 90; opacity: 0; transition: opacity 0.3s; }
        #volume-overlay.show { opacity: 1; }
        #volume-fill { position: absolute; bottom: 0; left: 0; right: 0; background: #818cf8; border-radius: 3px; transition: height 0.2s; }
        #volume-label { position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%); color: #e2e8f0; font-size: 14px; white-space: nowrap; }
    </style>
    <!-- QR code library (lightweight, no deps) -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <!-- HLS.js for m3u8 playback on Chrome -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
</head>
<body>
    <!-- Idle screen (before WS connects) -->
    <div id="idle-screen">
        <div class="logo">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
        </div>
        <h1>StreamDesk</h1>
        <p>Waiting for commands...</p>
        <div class="status-badge">
            <div class="dot"></div>
            <span id="connection-status">Connecting...</span>
        </div>
    </div>

    <!-- Standby screen (logo + QR code, shown in inapp mode) -->
    <div id="standby-screen">
        <div class="standby-logo">
            <svg fill="none" viewBox="0 0 24 24">
                <rect x="2" y="3" width="20" height="18" rx="2" fill="#818cf8"/>
                <path d="M10 8v8l6-4-6-4z" fill="#fff"/>
            </svg>
        </div>
        <h1>StreamDesk</h1>
        <div class="subtitle">Scan to control</div>
        <div id="qr-container"></div>
        <div id="standby-url"></div>
        <div class="scan-hint">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/>
            </svg>
            Use your phone to scan and control playback
        </div>
    </div>

    <!-- Tap to activate (browser autoplay policy) -->
    <div id="activate-overlay">
        <div class="tap-icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.042 21.672L13.684 16.6m0 0l-2.51 2.225.569-9.47 5.227 7.917-3.286-.672zM12 2.25V4.5m5.834.166l-1.591 1.591M20.25 10.5H18M7.757 14.743l-1.59 1.59M6 10.5H3.75m4.007-4.243l-1.59-1.59"/>
            </svg>
        </div>
        <p>Tap to activate monitor</p>
        <div class="sub">Required for autoplay to work</div>
    </div>

    <div id="media-container" class="hidden">
        <video id="video-player" class="hidden" playsinline preload="auto" controls></video>
        <iframe id="embed-player" class="hidden" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>

    
    <!-- Stream URL bar -->
    <div id="stream-url-bar">
        <div class="url-row" id="source-row">
            <span class="url-label">Source</span>
            <a id="source-url-link" href="#"></a>
            <button class="copy-btn" onclick="copyUrl('source')">Copy</button>
        </div>
        <div class="url-row" id="stream-row">
            <span class="url-label">Stream</span>
            <a id="stream-url-link" href="#"></a>
            <button class="copy-btn" onclick="copyUrl('stream')">Copy</button>
        </div>
        <button class="close-btn" onclick="hideStreamBar()">&times;</button>
    </div>

    <div id="toast"></div>
    <div id="volume-overlay">
        <div id="volume-fill" style="height: 50%"></div>
        <div id="volume-label">50%</div>
    </div>

    <script>
        let ws;
        let currentVolume = 50;
        let isMuted = false;
        let volumeTimeout, toastTimeout;
        let currentMediaUrl = '';
        let currentMediaTitle = '';

        let hlsInstance = null;
        let mediaMode = 'none'; // 'none' | 'video' | 'embed'
        let monitorActive = true; // true = external active (play), false = inapp active (standby)
        let wasPlayingBeforeStandby = false;
        let userActivated = false; // Has user tapped to allow autoplay?
        let pendingPlay = null; // {url, platform} queued before activation
        let showStandbyOnIdle = true; // Show QR standby when idle (false for in-app)
        let pendingStartTime = 0; // Resume position for OPEN_URL

        const idleScreen = document.getElementById('idle-screen');
        const standbyScreen = document.getElementById('standby-screen');
        const mediaContainer = document.getElementById('media-container');
        const videoPlayer = document.getElementById('video-player');
        const embedPlayer = document.getElementById('embed-player');
        const toast = document.getElementById('toast');
        const connStatus = document.getElementById('connection-status');
        const activateOverlay = document.getElementById('activate-overlay');

        // Tap to activate — unlocks autoplay
        activateOverlay.addEventListener('click', () => {
            activateMonitor();
        });

        function activateMonitor() {
            if (userActivated) return;
            userActivated = true;
            activateOverlay.classList.add('hidden');
            // Play a silent buffer to unlock audio context
            videoPlayer.muted = true;
            videoPlayer.src = 'data:video/mp4;base64,AAAAIGZ0eXBpc29tAAACAGlzb21pc28yYXZjMW1wNDEAAAAIZnJlZQAAA';
            videoPlayer.play().catch(() => {});
            videoPlayer.pause();
            videoPlayer.removeAttribute('src');
            videoPlayer.muted = isMuted;
            // If there was a pending play, do it now
            if (pendingPlay) {
                openMedia(pendingPlay.url, pendingPlay.platform);
                pendingPlay = null;
            }
        }

        const urlParams = new URLSearchParams(location.search);

        // Generate QR code on load
        generateQR();
        connect();

        function generateQR() {
            const deviceKey = urlParams.get('device_key');
            // If device_key present, QR = device_key for pairing; otherwise QR = frontend URL
            const qrData = deviceKey || ('http://' + location.hostname + ':3000');

            const qr = qrcode(0, 'M');
            qr.addData(qrData);
            qr.make();

            const container = document.getElementById('qr-container');
            const canvas = document.createElement('canvas');
            const cellSize = 6;
            const moduleCount = qr.getModuleCount();
            const size = moduleCount * cellSize;
            canvas.width = size;
            canvas.height = size;
            canvas.style.width = (size * 2) + 'px';
            canvas.style.height = (size * 2) + 'px';
            canvas.style.imageRendering = 'pixelated';

            const ctx = canvas.getContext('2d');
            for (let row = 0; row < moduleCount; row++) {
                for (let col = 0; col < moduleCount; col++) {
                    ctx.fillStyle = qr.isDark(row, col) ? '#1a1a2e' : '#ffffff';
                    ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
                }
            }
            container.innerHTML = '';
            container.appendChild(canvas);

            document.getElementById('standby-url').textContent = deviceKey
                ? 'Device: ' + deviceKey
                : qrData;
        }

        function connect() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const deviceKey = urlParams.get('device_key');
            const monitorToken = urlParams.get('monitor_token');
            let wsPath;
            if (deviceKey) {
                wsPath = `/ws/monitor-device/${encodeURIComponent(deviceKey)}`;
            } else if (monitorToken) {
                wsPath = `/ws/monitor-url/${encodeURIComponent(monitorToken)}`;
            } else {
                wsPath = '/ws/monitor';
            }
            ws = new WebSocket(`${protocol}//${location.host}${wsPath}`);
            ws.onopen = () => {
                connStatus.textContent = 'Connected';
                idleScreen.classList.add('hidden');
                if (mediaMode === 'none' && showStandbyOnIdle) {
                    showStandby();
                }
            };
            ws.onmessage = (e) => {
                try { handleCommand(JSON.parse(e.data)); }
                catch (err) { console.error('Bad msg:', err); }
            };
            ws.onclose = () => { connStatus.textContent = 'Reconnecting...'; setTimeout(connect, 3000); };
            ws.onerror = () => ws.close();
        }

        function handleCommand(cmd) {
            console.log('CMD:', cmd.action, cmd);
            switch (cmd.action) {
                case 'SET_MODE':
                    handleSetMode(cmd.mode);
                    break;
                case 'OPEN_URL':
                    currentMediaUrl = cmd.url || '';
                    currentMediaTitle = cmd.title || '';
                    pendingStartTime = cmd.start_time || 0;
                    openMedia(cmd.url, cmd.platform || '');
                    showStreamUrl(cmd.url, cmd.source_url || '');
                    break;
                case 'PLAY':        doPlay(); showToast('Playing'); break;
                case 'PAUSE':       doPause(); showToast('Paused'); break;
                case 'STOP':        doStop(); hideStreamBar(); showToast('Stopped'); break;
                case 'SEEK_FORWARD':  doSeek(cmd.value || 10); showToast(`+${cmd.value||10}s`); break;
                case 'SEEK_BACKWARD': doSeek(-(cmd.value || 10)); showToast(`-${cmd.value||10}s`); break;
                case 'SEEK_TO':     doSeekTo(cmd.value || 0); break;
                case 'VOLUME_UP':   doVolume(cmd.value || 10); break;
                case 'VOLUME_DOWN': doVolume(-(cmd.value || 10)); break;
                case 'SET_VOLUME':  doSetVolume(cmd.value ?? 50); break;
                case 'MUTE':        doMute(true); break;
                case 'UNMUTE':      doMute(false); break;
                default:            if (cmd.message) showToast(cmd.message);
            }
            reportStatus();
        }

        function handleSetMode(newMode) {
            if (newMode === 'out') {
                // This monitor is now active — hide standby
                // Backend will send OPEN_URL + SEEK_TO to resume
                monitorActive = true;
                hideStandby();
            } else {
                // This monitor is now inactive
                monitorActive = false;
                cleanup();
                mediaMode = 'none';
                mediaContainer.classList.add('hidden');
                if (showStandbyOnIdle) {
                    showStandby();
                } else {
                    idleScreen.classList.remove('hidden');
                }
            }
        }

        function showStandby() {
            idleScreen.classList.add('hidden');
            standbyScreen.classList.add('active');
        }

        function hideStandby() {
            standbyScreen.classList.remove('active');
        }

        // ── Open media ──

        function openMedia(url, platform) {
            idleScreen.classList.add('hidden');
            hideStandby();
            cleanup();

            if (platform === 'embed') {
                openEmbed(url);
            } else {
                openDirectVideo(url);
            }
        }

        // ── Direct video (mp4, m3u8, local files) ──

        function openDirectVideo(url) {
            // If user hasn't tapped yet, queue it and show overlay
            if (!userActivated) {
                pendingPlay = { url, platform: '' };
                activateOverlay.classList.remove('hidden');
                return;
            }

            mediaMode = 'video';
            mediaContainer.classList.remove('hidden');
            videoPlayer.classList.remove('hidden');
            embedPlayer.classList.add('hidden');
            videoPlayer.volume = currentVolume / 100;
            videoPlayer.muted = isMuted;

            const isHLS = url.includes('.m3u8');

            if (isHLS && typeof Hls !== 'undefined' && Hls.isSupported()) {
                // Use hls.js for m3u8 on Chrome/Firefox/etc.
                if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
                hlsInstance = new Hls({ maxBufferLength: 30, maxMaxBufferLength: 60 });
                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(videoPlayer);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    if (pendingStartTime > 0) {
                        const resumeTime = pendingStartTime;
                        pendingStartTime = 0;
                        videoPlayer.currentTime = resumeTime;
                    }
                    startPlayback();
                });
                hlsInstance.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        console.error('HLS fatal error:', data.type, data.details);
                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                            hlsInstance.startLoad();
                        } else {
                            hlsInstance.destroy();
                            hlsInstance = null;
                        }
                    }
                });
            } else if (isHLS && videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                // Native HLS (Safari, iOS, Android)
                videoPlayer.src = url;
                setupResume();
                startPlayback();
            } else {
                // Direct mp4/webm (e.g. YouTube extracted URL)
                videoPlayer.src = url;
                let retryCount = 0;
                const maxRetries = 2;
                videoPlayer.addEventListener('error', () => {
                    const err = videoPlayer.error;
                    console.error('Video error:', err?.code, err?.message);
                    if (retryCount < maxRetries) {
                        retryCount++;
                        showToast('Video error, retrying... (' + retryCount + ')');
                        setTimeout(() => {
                            videoPlayer.src = url;
                            videoPlayer.load();
                            videoPlayer.play().catch(() => {});
                        }, 1500 * retryCount);
                    } else {
                        showToast('Video failed to load');
                        if (ws && ws.readyState === WebSocket.OPEN) {
                            ws.send(JSON.stringify({ type: 'playback_error', error: err?.message || 'unknown' }));
                        }
                    }
                }, { once: false });
                // Handle stall/hang — if no progress for 15s, retry
                let stallTimer = null;
                videoPlayer.addEventListener('playing', () => {
                    clearTimeout(stallTimer);
                });
                videoPlayer.addEventListener('waiting', () => {
                    clearTimeout(stallTimer);
                    stallTimer = setTimeout(() => {
                        if (videoPlayer.paused || videoPlayer.ended) return;
                        if (retryCount < maxRetries) {
                            retryCount++;
                            showToast('Video stalled, retrying... (' + retryCount + ')');
                            const currentPos = videoPlayer.currentTime;
                            videoPlayer.src = url;
                            videoPlayer.load();
                            videoPlayer.currentTime = currentPos;
                            videoPlayer.play().catch(() => {});
                        }
                    }, 15000);
                });
                setupResume();
                startPlayback();
            }

            function setupResume() {
                if (pendingStartTime > 0) {
                    const resumeTime = pendingStartTime;
                    pendingStartTime = 0;
                    videoPlayer.addEventListener('loadeddata', () => {
                        if (resumeTime < videoPlayer.duration) {
                            videoPlayer.currentTime = resumeTime;
                        }
                    }, { once: true });
                }
            }

            function startPlayback() {
                videoPlayer.play().catch(e => {
                    console.error('Autoplay blocked, trying muted:', e.message);
                    videoPlayer.muted = true;
                    videoPlayer.play().then(() => {
                        showToast('Tap screen to unmute');
                        const unmute = () => {
                            videoPlayer.muted = isMuted;
                            showToast('Unmuted');
                            document.removeEventListener('click', unmute);
                        };
                        document.addEventListener('click', unmute, { once: true });
                    }).catch(() => {
                        showToast('Tap screen to start playback');
                    });
                });
            }
        }

        // ── Embed player (iframe) ──

        function openEmbed(url) {
            mediaMode = 'embed';
            mediaContainer.classList.remove('hidden');
            videoPlayer.classList.add('hidden');
            embedPlayer.classList.remove('hidden');
            embedPlayer.src = url;
        }

        // ── Cleanup ──

        function cleanup() {
            if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
            videoPlayer.pause();
            videoPlayer.removeAttribute('src');
            videoPlayer.load();
            embedPlayer.classList.add('hidden');
            embedPlayer.removeAttribute('src');
        }

        // ── Playback controls ──

        function doPlay() {
            if (mediaMode === 'video') {
                videoPlayer.muted = isMuted;
                videoPlayer.play().catch(e => {
                    console.error('Play failed:', e.message);
                    // Try muted fallback
                    videoPlayer.muted = true;
                    videoPlayer.play().catch(() => {});
                });
            }
        }

        function doPause() {
            if (mediaMode === 'video') videoPlayer.pause();
        }

        function doStop() {
            cleanup();
            currentMediaUrl = '';
            currentMediaTitle = '';
            mediaMode = 'none';
            videoPlayer.classList.add('hidden');
            mediaContainer.classList.add('hidden');
            if (showStandbyOnIdle) {
                showStandby();
            } else {
                idleScreen.classList.remove('hidden');
            }
        }

        function doSeek(sec) {
            if (mediaMode === 'video') {
                videoPlayer.currentTime = Math.max(0, videoPlayer.currentTime + sec);
            }
        }

        function doSeekTo(val) {
            if (mediaMode === 'video' && videoPlayer.duration) {
                videoPlayer.currentTime = val;
            }
        }

        function doVolume(delta) {
            currentVolume = Math.max(0, Math.min(100, currentVolume + delta));
            if (mediaMode === 'video') {
                videoPlayer.volume = currentVolume / 100;
            }
            showVolumeOverlay();
        }

        function doSetVolume(vol) {
            currentVolume = Math.max(0, Math.min(100, vol));
            if (mediaMode === 'video') {
                videoPlayer.volume = currentVolume / 100;
                videoPlayer.muted = currentVolume === 0;
                isMuted = currentVolume === 0;
            }
            showVolumeOverlay();
        }

        function doMute(mute) {
            isMuted = mute;
            if (mediaMode === 'video') videoPlayer.muted = mute;
            showToast(mute ? 'Muted' : 'Unmuted');
        }

        // ── Helpers ──

        function reportStatus() {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            let playing = false, duration = 0, position = 0;
            if (mediaMode === 'video' && videoPlayer.src) {
                playing = !videoPlayer.paused;
                duration = videoPlayer.duration || 0;
                position = videoPlayer.currentTime || 0;
            }
            ws.send(JSON.stringify({
                type: 'status',
                playing, title: currentMediaTitle, url: currentMediaUrl,
                volume: currentVolume, muted: isMuted,
                duration, position,
            }));
        }
        setInterval(reportStatus, 1000);

        function showToast(text) {
            toast.textContent = text;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function showVolumeOverlay() {
            const o = document.getElementById('volume-overlay');
            document.getElementById('volume-fill').style.height = currentVolume + '%';
            document.getElementById('volume-label').textContent = currentVolume + '%';
            o.classList.add('show');
            clearTimeout(volumeTimeout);
            volumeTimeout = setTimeout(() => o.classList.remove('show'), 2000);
        }

        // ── Wake Lock — prevents screen/tab sleeping on Android ──
        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ("wakeLock" in navigator) {
                    wakeLock = await navigator.wakeLock.request("screen");
                    console.log("Wake Lock acquired");
                    wakeLock.addEventListener("release", () => {
                        console.log("Wake Lock released, re-acquiring...");
                        setTimeout(requestWakeLock, 1000);
                    });
                }
            } catch (e) { console.warn("Wake Lock failed:", e); }
        }
        requestWakeLock();
        // Re-acquire wake lock when page becomes visible again
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible") requestWakeLock();
        });

        // ── Anti-discard: periodic activity to prevent Chrome memory saver ──
        setInterval(() => {
            // Tiny DOM interaction keeps Chrome from discarding this tab
            document.title = "StreamDesk" + (mediaMode === "video" && !videoPlayer.paused ? " ▶" : "");
        }, 30000);

        
        // ── Stream URL bar ──
        let currentStreamUrl = '';
        let currentSourceUrl = '';
        const streamUrlBar = document.getElementById('stream-url-bar');
        const streamUrlLink = document.getElementById('stream-url-link');
        const sourceUrlLink = document.getElementById('source-url-link');
        const sourceRow = document.getElementById('source-row');
        const streamRow = document.getElementById('stream-row');

        function showStreamUrl(streamUrl, sourceUrl) {
            currentStreamUrl = streamUrl || '';
            currentSourceUrl = sourceUrl || '';
            if (!currentStreamUrl && !currentSourceUrl) { hideStreamBar(); return; }
            // Source URL (website) — opens in new tab
            if (currentSourceUrl) {
                sourceUrlLink.href = currentSourceUrl;
                sourceUrlLink.textContent = currentSourceUrl;
                sourceUrlLink.onclick = function(e) {
                    e.preventDefault();
                    window.location.href = currentSourceUrl;
                };
                sourceRow.style.display = 'flex';
            } else {
                sourceRow.style.display = 'none';
            }
            // Stream URL (m3u8/mp4) — navigates same tab
            if (currentStreamUrl) {
                streamUrlLink.href = currentStreamUrl;
                streamUrlLink.textContent = currentStreamUrl;
                streamUrlLink.onclick = function(e) {
                    e.preventDefault();
                    window.location.href = currentStreamUrl;
                };
                streamRow.style.display = 'flex';
            } else {
                streamRow.style.display = 'none';
            }
            streamUrlBar.classList.add('show');
        }

        function hideStreamBar() {
            streamUrlBar.classList.remove('show');
        }

        function copyUrl(type) {
            const url = type === 'source' ? currentSourceUrl : currentStreamUrl;
            if (!url) return;
            navigator.clipboard.writeText(url).then(() => {
                showToast('Copied ' + type + ' URL');
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = url;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('Copied ' + type + ' URL');
            });
        }

        // Hide cursor after inactivity
        let cursorTimeout;
        document.addEventListener('mousemove', () => {
            document.body.style.cursor = 'default';
            clearTimeout(cursorTimeout);
            cursorTimeout = setTimeout(() => { document.body.style.cursor = 'none'; }, 3000);
        });
    </script>
</body>
</html>
